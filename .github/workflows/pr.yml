name: Pull Request

on:
  pull_request:
    branches: [main, alpha]

permissions:
  contents: read

jobs:
  pull_request:
    uses: algorandfoundation/algokit-shared-config/.github/workflows/node-ci.yml@chore/node-npm
    with:
      run-commit-lint: true
      run-build: true
      install-algokit: true
      audit-script: npm run audit

  check_docs:
    uses: algorandfoundation/algokit-shared-config/.github/workflows/check-docs.yml@chore/node-npm
